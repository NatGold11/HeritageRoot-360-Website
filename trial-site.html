<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Custom hot spots</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <div class="center">
        <h1>Heritage Roots</h1>
    </div>

    <style>
    #panorama {
        width: 800px;
        height: 600px;
        margin: auto;
    }
    .center{
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .custom-hotspot {
        height: 100px;
        width: 100px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
    }
    div.info-page span{
        visibility: hidden;
        position: absolute;
        border-radius: 3px;
        height: 500px;
        width: 500px;
        background: #fff;
        background-position: center;
        text-align: center;
    }
    div.custom-tooltip span {
        visibility: hidden;
        position: absolute;
        border-radius: 3px;
        background-color: #fff;
        color: #000;
        text-align: center;
        max-width: 200px;
        padding: 5px 10px;
        margin-left: -220px;
        cursor: default;
    }
    div.custom-tooltip:hover span{
        visibility: visible;
    }
    div.custom-tooltip:hover span:after {
        content: '';
        position: absolute;
        width: 0;
        height: 0;
        border-width: 10px;
        border-style: solid;
        border-color: #fff transparent transparent transparent;
        bottom: -20px;
        left: -10px;
        margin: 0 50%;
    }

    /* Info Panel Styles */
    .info-panel {
        display: none; /* Hidden by default */
        position: fixed;
        z-index: 99999; /* Very high to work in fullscreen */
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent overlay */
        overflow-y: auto; /* Allow scrolling */
        pointer-events: auto; /* Catch all clicks */
    }

    .info-panel-content {
        background-color: #fff;
        margin: 5% auto;
        padding: 30px;
        border-radius: 10px;
        width: 80%;
        max-width: 600px;
        max-height: 85vh; /* Limit height to 85% of viewport */
        position: relative;
        animation: slideDown 0.3s ease-out;
        overflow-y: auto; /* Allow scrolling within content */
        pointer-events: auto; /* Ensure content is clickable */
    }

    @keyframes slideDown {
        from {
            transform: translateY(-50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .close-btn {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
    }

    .close-btn:hover,
    .close-btn:focus {
        color: #000;
    }

    #panel-title {
        margin-top: 0;
        color: #333;
    }

    #panel-image {
        width: 100%;
        max-width: 400px;
        max-height: 400px; /* Limit image height */
        height: auto;
        display: block;
        margin: 20px auto;
        object-fit: contain; /* Keep aspect ratio */
    }

    #panel-description {
        color: #666;
        line-height: 1.6;
        font-size: 16px;
    }
    </style>
</head>
<body>

<div id="panorama">
    <!-- Info Panel - Must be inside panorama for fullscreen -->
    <div id="info-panel" class="info-panel">
        <div class="info-panel-content">
            <span class="close-btn">&times;</span>
            <h2 id="panel-title">Title</h2>
            <img id="panel-image" src="" alt="">
            <p id="panel-description">Description goes here</p>
        </div>
    </div>
</div>

<script>
// Create viewer
viewer = pannellum.viewer('panorama', {
    "default": {
        "firstScene": "beach",
        "sceneFadeDuration": 1000
    },

    "scenes": {
        "beach": {
            "title": "Beach",
            "hfov": 110,
            "pitch": -3,
            "yaw": 117,
            "type": "equirectangular",
            "panorama": "images/GS__0077.JPG",
            //"hotSpotDebug": true,
            "hotSpots": [
                {
                    "pitch": -23.6,
                    "yaw": -101.7,
                    "cssClass": "custom-hotspot",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": {
                        "image": "images/bowl.png",
                        "text": "Bowl"
                    },
                    "clickHandlerFunc": showPanel,
                    "clickHandlerArgs": {"panelId": "bowl-panel"} 
                },
                {
                    "pitch": -19.3,
                    "yaw": 39.2,
                    "cssClass": "custom-hotspot",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": {
                        "image": "images/manioc_root.png",
                        "text": "Manioc Root"
                    },
                    "clickHandlerFunc": showPanel,
                    "clickHandlerArgs": {"panelId": "manioc-root-panel"} 
                },
                {
                    "pitch": -2.2,
                    "yaw": -126.6,
                    "type": "scene",
                    "text": "Path to Jungle",
                    "sceneId": "path"
                }
            ]
        },
        "path": {
            "title": "Path",
            "hfov": 110,
            "pitch": -3,
            "yaw": 117,
            "type": "equirectangular",
            "panorama": "images/GS__0083.JPG",
            //"hotSpotDebug": true,
            "hotSpots": [
                {
                    "pitch": 10.1,
                    "yaw": -151,
                    "cssClass": "custom-hotspot",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": {
                        "image": "images/chonta_bundle.png",
                        "text": "Chonta Bundle"
                    },
                    "clickHandlerFunc": showPanel,
                    "clickHandlerArgs": {"panelId": "chonta-bundle-panel"} 
                },
                {
                   "pitch": -55,
                    "yaw": 70,
                    "cssClass": "custom-hotspot",
                    "createTooltipFunc": hotspot,
                    "createTooltipArgs": {
                        "image": "images/blowgun_dart_case.png",
                        "text": "Blowgun Dart Case"
                    },
                    "clickHandlerFunc": showPanel,
                    "clickHandlerArgs": {"panelId": "blowgun-dart-case-panel"} 
                },
                {
                    "pitch": -3.2,
                    "yaw": -1.5,
                    "type": "scene",
                    "text": "Beach",
                    "sceneId": "beach"
                }
            ]
        }

    }
});

// Hot spot creation function
function hotspot(hotSpotDiv, args) {
    hotSpotDiv.style.backgroundImage = `url('${args.image}')`;
    hotSpotDiv.classList.add('custom-tooltip');
    var span = document.createElement('span');
    span.innerHTML = args.text;
    hotSpotDiv.appendChild(span);
    span.style.width = span.scrollWidth - 20 + 'px';
    span.style.marginLeft = -(span.scrollWidth - hotSpotDiv.offsetWidth) / 2 + 'px';
    span.style.marginTop = -span.scrollHeight - 12 + 'px';
}

// Show panel function
function showPanel(event, args) {
    // Get the panel element
    var panel = document.getElementById('info-panel');
    
    // Get content based on which hotspot was clicked
    var content = getPanelContent(args.panelId);
    
    // Update panel content
    document.getElementById('panel-title').innerHTML = content.title;
    document.getElementById('panel-image').src = content.image;
    document.getElementById('panel-description').innerHTML = content.description;
    
    // Show the panel
    panel.style.display = 'block';
}

// Function to get content for each hotspot
function getPanelContent(panelId) {
    var contents = {
        "bowl-panel": {
            title: "Bowl",
            image: "images/bowl.png",
            description: "Information goes here"
        },
        "manioc-root-panel": {
            title: "Manioc Root",
            image: "images/manioc_root.png",
            description: "Information goes here"
        },
        "chonta-bundle-panel": {
            title: "Chonta Bundle",
            image: "images/chonta_bundle.png",
            description: "Information goes here"
        },
        "blowgun-dart-case-panel": {
            title: "Blowgun Dart Case",
            image: "images/blowgun_dart_case.png",
            description: "Information goes here"
        }
    };
    
    return contents[panelId];
}

// Close panel event handlers
document.addEventListener('DOMContentLoaded', function() {
    var closeBtn = document.querySelector('.close-btn');
    var panel = document.getElementById('info-panel');
    var panelContent = document.querySelector('.info-panel-content');
    
    // Prevent panorama interaction when clicking on panel content
    panelContent.onclick = function(event) {
        event.stopPropagation();
    };
    
    // Close when clicking X button
    closeBtn.onclick = function(event) {
        event.stopPropagation();
        panel.style.display = 'none';
    };
    
    // Close when clicking outside the content (on the dark overlay)
    panel.onclick = function(event) {
        if (event.target === panel) {
            panel.style.display = 'none';
        }
    };
    
    // Close when pressing Escape key
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && panel.style.display === 'block') {
            panel.style.display = 'none';
        }
    });
});

</script>

</body>
</html>
